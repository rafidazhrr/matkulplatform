<!doctype html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="AppToko" />
    <link rel="apple-touch-icon" href="icons/image.png" />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0b1120;
        background-image:
          radial-gradient(
            circle at 20% 0%,
            rgba(16, 185, 129, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 100%,
            rgba(6, 182, 212, 0.1) 0%,
            transparent 40%
          );
        background-attachment: fixed;
        background-size: cover;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #0b1120;
      }

      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 5px;
        border: 2px solid #0b1120;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body
    class="min-h-screen text-slate-200 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200 overflow-x-hidden relative flex flex-col"
  >
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div
        class="absolute -top-1/2 -left-1/2 w-full h-full bg-gradient-to-br from-emerald-500/5 to-transparent blur-[120px] transform rotate-12"
      ></div>
    </div>

    <main class="flex-grow flex items-center justify-center py-16 px-6">
      <div class="w-full max-w-md mx-auto">
        <div
          class="bg-slate-800/40 backdrop-blur-xl p-8 border border-slate-700/50 rounded-3xl shadow-lg animate-[fadeInUp_0.6s_ease-out]"
        >
          <div class="text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold font-display mb-2">
              <span class="text-white">Masuk ke</span>
              <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500"
              >
                RafMart</span
              >
            </h1>
            <p class="text-slate-400 mt-2">
              Masuk untuk mengelola katalog dan mengakses fitur lengkap.
            </p>
          </div>

          <form id="form-login" class="mt-6 space-y-4">
            <div>
              <label for="email" class="sr-only">Username</label>
              <input
                id="email"
                name="email"
                type="text"
                required
                placeholder="Masukkan Username"
                class="w-full bg-slate-900/50 border border-slate-600/50 text-slate-200 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 placeholder-slate-500 transition-all duration-300"
              />
            </div>

            <div class="relative">
              <label for="password" class="sr-only">Kata Sandi</label>
              <input
                id="password"
                name="password"
                type="password"
                required
                placeholder="Masukkan Password"
                class="w-full bg-slate-900/50 border border-slate-600/50 text-slate-200 p-3 rounded-xl pr-12 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 placeholder-slate-500 transition-all duration-300"
              />

              <button
                type="button"
                aria-label="Toggle password visibility"
                id="toggle-password"
                class="absolute inset-y-0 right-2 flex items-center px-2 text-slate-300"
              >
                <svg
                  id="eye-open"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
                <svg
                  id="eye-closed"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 hidden"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.223-3.845M6.11 6.11A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.965 9.965 0 01-4.189 5.27M3 3l18 18"
                  />
                </svg>
              </button>
            </div>

            <div
              class="flex items-center justify-between text-sm text-slate-400"
            ></div>

            <button
              type="submit"
              class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-white font-bold py-3 px-6 rounded-xl transition-all duration-300 hover:shadow-[0_8px_30px_-10px_rgba(16,185,129,0.4)]"
            >
              Masuk
            </button>
          </form>
        </div>
      </div>
    </main>

    <footer
      class="relative z-10 py-6 border-t border-slate-800/50 mt-auto backdrop-blur-md bg-slate-900/30"
    >
      <div class="text-center">
        <p class="text-slate-500 text-sm font-medium">
          RafidAzmiH • UmPontianak
        </p>
      </div>
    </footer>

    <script>
      // Themed toast for login page (matches app theme)
      function showToast(message, type = "success") {
        try {
          const gradients = {
            success: "from-emerald-500 to-cyan-500",
            error: "from-red-500 to-rose-500",
            info: "from-slate-600 to-slate-500",
          };

          const icons = {
            success: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 stroke-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`,
            error: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 stroke-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`,
            info: `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 stroke-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01"/></svg>`,
          };

          const gradient = gradients[type] || gradients.success;
          const icon = icons[type] || icons.success;

          const toast = document.createElement("div");
          toast.setAttribute("role", "status");
          toast.className = `fixed right-6 bottom-6 z-50 pointer-events-auto max-w-sm w-full rounded-xl px-4 py-3 text-white shadow-[0_10px_30px_-10px_rgba(16,185,129,0.25)] border border-emerald-600/20 bg-gradient-to-r ${gradient} font-semibold`;

          toast.style.opacity = "0";
          toast.style.transform = "translateY(10px)";
          toast.style.transition = "opacity 260ms ease, transform 260ms ease";

          toast.innerHTML = `
            <div class="flex items-center gap-3 text-sm font-semibold">
              ${icon}
              <div class="flex-1">${message}</div>
              <button class="ml-3 text-white/90 close-toast px-2 py-1 rounded-lg" aria-label="Tutup">×</button>
            </div>
          `;

          document.body.appendChild(toast);
          requestAnimationFrame(() => {
            toast.style.opacity = "1";
            toast.style.transform = "translateY(0)";
          });

          const closeBtn = toast.querySelector(".close-toast");
          if (closeBtn)
            closeBtn.addEventListener("click", () => {
              if (toast && toast.parentNode)
                toast.parentNode.removeChild(toast);
            });

          setTimeout(() => {
            if (toast && toast.parentNode) toast.parentNode.removeChild(toast);
          }, 3500);
        } catch (err) {
          console.error("showToast error:", err);
        }
      }

      // Toggle password visibility (eye icon)
      (function () {
        const toggle = document.getElementById("toggle-password");
        const pwd = document.getElementById("password");
        const eyeOpen = document.getElementById("eye-open");
        const eyeClosed = document.getElementById("eye-closed");
        if (!toggle || !pwd) return;
        toggle.addEventListener("click", function (e) {
          e.preventDefault();
          if (pwd.type === "password") {
            pwd.type = "text";
            if (eyeOpen) eyeOpen.classList.add("hidden");
            if (eyeClosed) eyeClosed.classList.remove("hidden");
            toggle.setAttribute("aria-label", "Sembunyikan kata sandi");
          } else {
            pwd.type = "password";
            if (eyeOpen) eyeOpen.classList.remove("hidden");
            if (eyeClosed) eyeClosed.classList.add("hidden");
            toggle.setAttribute("aria-label", "Tampilkan kata sandi");
          }
        });
      })();

      // Login submit (use themed toast)
      document
        .getElementById("form-login")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const usr = document.getElementById("email").value.trim();
          const pwd = document.getElementById("password").value;

          try {
            const res = await fetch("../api_toko/login.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username: usr, password: pwd }),
            });

            if (!res.ok) {
              showToast("Gagal terhubung ke server.", "error");
              return;
            }

            const hasil = await res.json();

            if (hasil.status === "success") {
              localStorage.setItem("token_toko", hasil.token);
              showToast("Berhasil login!", "success");
              setTimeout(() => {
                window.location.href = "index.html";
              }, 700);
            } else {
              showToast(hasil.pesan || "Gagal login", "error");
            }
          } catch (err) {
            console.error(err);
            showToast("Terjadi kesalahan. Periksa koneksi ke server.", "error");
          }
        });
    </script>
  </body>
</html>
